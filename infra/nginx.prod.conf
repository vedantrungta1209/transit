events { worker_connections 1024; }

http {
    # Redirect all HTTP → HTTPS
    server {
        listen 80;
        server_name transit-api.transitco.in admin.transitco.in;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # API — api.transitco.in
    server {
        listen 443 ssl;
        server_name transit-api.transitco.in;

        ssl_certificate     /etc/letsencrypt/live/transit-api.transitco.in/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/transit-api.transitco.in/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        client_max_body_size 20M;

        # Socket.IO
        location /socket.io/ {
            proxy_pass         http://api:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
            proxy_cache_bypass $http_upgrade;
        }

        # REST
        location / {
            proxy_pass         http://api:3000;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # Admin panel — admin.transitco.in
    server {
        listen 443 ssl;
        server_name admin.transitco.in;

        ssl_certificate     /etc/letsencrypt/live/admin.transitco.in/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/admin.transitco.in/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Proxy /api/* calls from the admin SPA to the API service
        location /api/ {
            proxy_pass         http://api:3000/api/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass       http://admin:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
