name: EAS Build + Submit

# Actual compilation runs on EAS servers — this workflow submits the job and waits,
# then submits the finished build to TestFlight / Play Store internal track.
#
# Secrets required in GitHub repo settings:
#   EXPO_TOKEN  — from expo.dev → Account Settings → Access Tokens
#
# One-time setup (run locally once, then credentials are stored in EAS):
#   cd apps/customer-app && eas credentials   # set up iOS ASC key + Android keystore
#   cd apps/driver-app   && eas credentials   # same for driver app
#
# Tag conventions:
#   customer-preview-v*  → Customer APK  (Android sideload / internal testing)
#   customer-v*          → Customer iOS (TestFlight) + Android AAB (Play Store internal)
#   driver-preview-v*    → Driver APK    (Android sideload / internal testing)
#   driver-v*            → Driver iOS (TestFlight) + Android AAB (Play Store internal)

on:
  push:
    tags:
      - 'customer-v*'
      - 'customer-preview-v*'
      - 'driver-v*'
      - 'driver-preview-v*'

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Customer app
  # ───────────────────────────────────────────────────────────────────────────
  build-customer-preview:
    name: Customer — Android APK (preview)
    runs-on: ubuntu-latest
    if: startsWith(github.ref_name, 'customer-preview-')
    defaults:
      run:
        working-directory: apps/customer-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
      - name: Install dependencies (monorepo root)
        run: cd ../.. && npm install
      - name: Install EAS CLI
        run: npm install -g eas-cli@latest
      - name: Build Android APK
        run: eas build --profile preview --platform android --non-interactive --wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  build-customer-production:
    name: Customer — iOS + Android AAB (production)
    runs-on: ubuntu-latest
    if: startsWith(github.ref_name, 'customer-v') && !startsWith(github.ref_name, 'customer-preview-')
    timeout-minutes: 120
    defaults:
      run:
        working-directory: apps/customer-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
      - name: Install dependencies (monorepo root)
        run: cd ../.. && npm install
      - name: Install EAS CLI
        run: npm install -g eas-cli@latest
      - name: Build iOS + Android
        run: eas build --profile production --platform all --non-interactive --wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      - name: Submit iOS to TestFlight
        run: eas submit --profile production --platform ios --latest --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      - name: Submit Android to Play Store (internal)
        run: eas submit --profile production --platform android --latest --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  # ───────────────────────────────────────────────────────────────────────────
  # Driver app
  # ───────────────────────────────────────────────────────────────────────────
  build-driver-preview:
    name: Driver — Android APK (preview)
    runs-on: ubuntu-latest
    if: startsWith(github.ref_name, 'driver-preview-')
    defaults:
      run:
        working-directory: apps/driver-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
      - name: Install dependencies (monorepo root)
        run: cd ../.. && npm install
      - name: Install EAS CLI
        run: npm install -g eas-cli@latest
      - name: Build Android APK
        run: eas build --profile preview --platform android --non-interactive --wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  build-driver-production:
    name: Driver — iOS + Android AAB (production)
    runs-on: ubuntu-latest
    if: startsWith(github.ref_name, 'driver-v') && !startsWith(github.ref_name, 'driver-preview-')
    timeout-minutes: 120
    defaults:
      run:
        working-directory: apps/driver-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
      - name: Install dependencies (monorepo root)
        run: cd ../.. && npm install
      - name: Install EAS CLI
        run: npm install -g eas-cli@latest
      - name: Build iOS + Android
        run: eas build --profile production --platform all --non-interactive --wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      - name: Submit iOS to TestFlight
        run: eas submit --profile production --platform ios --latest --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      - name: Submit Android to Play Store (internal)
        run: eas submit --profile production --platform android --latest --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
