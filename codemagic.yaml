  # ─────────────────────────────────────────────────────────────────────────────
  # Transit Customer — Android AAB → Play Store internal track
  # Trigger: tag customer-v*
  # ─────────────────────────────────────────────────────────────────────────────
  transit-customer-android-prod:
    name: Transit Customer — Android AAB (Play Store)
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      android_signing:
        - transit_customer_keystore
      groups:
        - transit_android
      vars:
        EXPO_PUBLIC_API_URL: "https://transit-api.transitco.in"
        EXPO_PUBLIC_RAZORPAY_KEY: "rzp_live_Sygzq2mkLj0s0k"
        EXPO_PUBLIC_GOOGLE_MAPS_KEY: "AIzaSyBeQ62HN5qz2lgUuau6paxlbXtudCBG1yA"
      node: 20.17.0
      java: 17

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'customer-v*'
          include: true
        - pattern: 'customer-preview-v*'
          include: false

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Expo prebuild
        script: |
          cd apps/customer-app
          npx expo prebuild --platform android --clean --non-interactive

      - name: Configure release signing
        script: |
          cat > apps/customer-app/android/key.properties << EOF
          storePassword=$CM_KEYSTORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=$CM_KEYSTORE_PATH
          EOF

          python3 << 'PYEOF'
          with open('apps/customer-app/android/app/build.gradle', 'r') as f:
              content = f.read()
          loader = (
              '\ndef keystorePropertiesFile = rootProject.file("key.properties")\n'
              'def keystoreProperties = new Properties()\n'
              'keystoreProperties.load(new FileInputStream(keystorePropertiesFile))\n\n'
          )
          content = content.replace(
              '    signingConfigs {\n        debug {',
              loader + '    signingConfigs {\n'
              '        release {\n'
              "            storeFile file(keystoreProperties['storeFile'])\n"
              "            storePassword keystoreProperties['storePassword']\n"
              "            keyAlias keystoreProperties['keyAlias']\n"
              "            keyPassword keystoreProperties['keyPassword']\n"
              '        }\n        debug {'
          ).replace(
              '            // Caution! In production, you need to generate your own keystore file.\n'
              '            // see https://reactnative.dev/docs/signed-apk-android.\n'
              '            signingConfig signingConfigs.debug',
              '            signingConfig signingConfigs.release'
          )
          with open('apps/customer-app/android/app/build.gradle', 'w') as f:
              f.write(content)
          print('✅ Release signing config patched')
          PYEOF

      - name: Set version code and name
        script: |
          VERSION=$(echo $FCI_TAG | sed 's/customer-v//')
          cd apps/customer-app/android
          sed -i '' "s/versionCode [0-9]*/versionCode $BUILD_NUMBER/" app/build.gradle
          sed -i '' "s/versionName \"[^\"]*\"/versionName \"$VERSION\"/" app/build.gradle

      - name: Build AAB
        script: |
          cd apps/customer-app/android
          ./gradlew bundleRelease

      - name: Publish to Play Store (internal track)
        script: |
          echo "$GPLAY_SA_JSON" > /tmp/gplay_key.json
          pip install google-auth google-api-python-client --quiet
          python3 << 'PYEOF'
          import glob
          from googleapiclient.discovery import build
          from google.oauth2 import service_account

          creds = service_account.Credentials.from_service_account_file(
              '/tmp/gplay_key.json',
              scopes=['https://www.googleapis.com/auth/androidpublisher']
          )
          service = build('androidpublisher', 'v3', credentials=creds)
          package = 'in.transitco.customer'
          edit = service.edits().insert(body={}, packageName=package).execute()
          edit_id = edit['id']
          aab = glob.glob('apps/customer-app/android/app/build/outputs/**/*.aab', recursive=True)[0]
          with open(aab, 'rb') as f:
              service.edits().bundles().upload(
                  packageName=package, editId=edit_id,
                  media_body=aab, media_mime_type='application/octet-stream'
              ).execute()
          service.edits().tracks().update(
              packageName=package, editId=edit_id, track='internal',
              body={'releases': [{'status': 'completed', 'releaseNotes': []}]}
          ).execute()
          service.edits().commit(packageName=package, editId=edit_id).execute()
          print('✅ Published to Play Store internal track')
          PYEOF

    artifacts:
      - apps/customer-app/android/app/build/outputs/bundle/release/*.aab
      - apps/customer-app/android/app/build/outputs/**/mapping.txt


