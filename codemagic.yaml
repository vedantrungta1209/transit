  # ─────────────────────────────────────────────────────────────────────────────
  # Transit Customer — iOS (TestFlight)
  # Trigger: tag customer-v*
  # ─────────────────────────────────────────────────────────────────────────────
  transit-customer-ios:
    name: Transit Customer — iOS (TestFlight)
    max_build_duration: 90
    instance_type: mac_mini_m2

    environment:
      groups:
        - transit_ios
        - transit_android
      vars:
        EXPO_PUBLIC_API_URL: "https://transit-api.transitco.in"
        EXPO_PUBLIC_RAZORPAY_KEY: "rzp_live_Sygzq2mkLj0s0k"
        EXPO_PUBLIC_GOOGLE_MAPS_KEY: "AIzaSyBeQ62HN5qz2lgUuau6paxlbXtudCBG1yA"
        BUNDLE_ID: "in.transitco.customer"
      node: 20.17.0
      xcode: 16
      cocoapods: 1.15.2

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'customer-v*'
          include: true
        - pattern: 'customer-preview-v*'
          include: false

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Expo prebuild (iOS)
        script: |
          cd apps/customer-app
          npx expo prebuild --platform ios --clean --non-interactive

      - name: Patch Podfile and react_native_pods.rb
        script: |
          perl -i -0pe 's/,\s*\n\s*:privacy_file_aggregation_enabled\s*=>[^\n]*//g' apps/customer-app/ios/Podfile
          python3 << 'PYEOF'
          import os

          # 1. Add razorpay-pod from GitHub (CDN is unreachable on CI)
          with open('apps/customer-app/ios/Podfile', 'r') as f:
              content = f.read()
          if 'razorpay-pod' not in content:
              content = content.replace(
                  "target 'Transit' do",
                  "target 'Transit' do\n  pod 'razorpay-pod', :git => 'https://github.com/razorpay/razorpay-pod.git'",
                  1
              )
          with open('apps/customer-app/ios/Podfile', 'w') as f:
              f.write(content)
          print('✅ Podfile patched')

          # 2. Fix React-jsinspector missing :modular_headers => true in react_native_pods.rb
          # Glob finds @types/react-native copy first and breaks — use explicit paths instead
          old = "pod 'React-jsinspector', :path => \"#{prefix}/ReactCommon/jsinspector-modern\""
          new = "pod 'React-jsinspector', :path => \"#{prefix}/ReactCommon/jsinspector-modern\", :modular_headers => true"
          candidates = [
              'apps/customer-app/node_modules/react-native/scripts/react_native_pods.rb',
              'node_modules/react-native/scripts/react_native_pods.rb',
          ]
          patched = 0
          for path in candidates:
              if not os.path.exists(path):
                  print(f'Not found (skip): {path}')
                  continue
              with open(path, 'r') as f:
                  c = f.read()
              if old in c:
                  with open(path, 'w') as f:
                      f.write(c.replace(old, new, 1))
                  print(f'✅ Patched: {path}')
                  patched += 1
              elif new in c:
                  print(f'Already patched: {path}')
                  patched += 1
              else:
                  print(f'⚠️ Pattern not found in: {path}')
          if patched == 0:
              print('❌ ERROR: react_native_pods.rb not patched')
              raise SystemExit(1)
          PYEOF

      - name: Install CocoaPods
        script: |
          ls apps/customer-app/ios/Podfile || { echo "ERROR: Podfile missing — prebuild failed"; exit 1; }
          export NODE_PATH="$PWD/node_modules:$PWD/apps/customer-app/node_modules"
          cd apps/customer-app/ios
          pod install --verbose 2>&1

      - name: Fetch signing certificate and profile
        script: |
          printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" > /tmp/asc_key.p8
          echo "$CM_CERTIFICATE" | base64 --decode > /tmp/cert.p12
          # Extract private key from P12 so fetch-signing-files can match cert to profile
          openssl pkcs12 -in /tmp/cert.p12 -nocerts -nodes \
            -passin pass:"$CM_CERTIFICATE_PASSWORD" -out /tmp/cert_key.pem 2>/dev/null \
            || openssl pkcs12 -in /tmp/cert.p12 -nocerts -noenc \
            -passin pass:"$CM_CERTIFICATE_PASSWORD" -out /tmp/cert_key.pem
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key @file:/tmp/cert_key.pem \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --private-key @file:/tmp/asc_key.p8 \
            --create \
            --save
          keychain initialize
          keychain add-certificates --certificate /tmp/cert.p12 --certificate-password "$CM_CERTIFICATE_PASSWORD"

      - name: Detect Xcode workspace
        script: |
          WS=$(find apps/customer-app/ios -name "*.xcworkspace" -maxdepth 2 | head -1)
          if [ -z "$WS" ]; then echo "ERROR: No .xcworkspace found after pod install"; exit 1; fi
          SCHEME=$(basename "$WS" .xcworkspace)
          echo "XCODE_WORKSPACE=$WS" >> $CM_ENV
          echo "XCODE_SCHEME=$SCHEME" >> $CM_ENV
          echo "Workspace: $WS  Scheme: $SCHEME"

      - name: Set build number
        script: |
          cd apps/customer-app/ios
          agvtool new-version -all $BUILD_NUMBER

      - name: Build IPA
        script: |
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

      - name: Upload to TestFlight
        script: |
          app-store-connect publish \
            --path "$(find build/ios/ipa -name '*.ipa' | head -1)" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --private-key @file:/tmp/asc_key.p8 \
            --testflight

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log


