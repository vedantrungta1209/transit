          sed -i '' "s/versionName \"[^\"]*\"/versionName \"$VERSION\"/" app/build.gradle

      - name: Patch expo-modules-core Kotlin
        script: |
          python3 << 'PYEOF'
          path = 'node_modules/expo-modules-core/android/src/main/java/expo/modules/adapters/react/permissions/PermissionsService.kt'
          with open(path, 'r') as f:
              content = f.read()
          patched = content.replace(
              'return requestedPermissions.contains(permission)',
              'return requestedPermissions?.contains(permission) == true'
          )
          if patched != content:
              with open(path, 'w') as f:
                  f.write(patched)
              print('✅ PermissionsService.kt null-safety patched')
          else:
              print('ℹ️ PermissionsService.kt already patched or pattern not found')
          PYEOF

      - name: Build AAB
        script: |
          export NODE_PATH="$PWD/node_modules:$PWD/apps/customer-app/node_modules"
          cd apps/customer-app/android
          ./gradlew bundleRelease -PreactNativeArchitectures=arm64-v8a,armeabi-v7a --stacktrace 2>&1

      - name: Upload to Play Store (internal)
        ignore_failure: true
        script: |
          printf '%s' "$GPLAY_SA_JSON" > /tmp/gplay_key.json
          if ! python3 -c "import json,sys; d=json.load(open('/tmp/gplay_key.json')); assert d.get('type')=='service_account'" 2>/dev/null; then
            echo "⚠️  GPLAY_SA_JSON not configured or invalid — skipping Play Store upload."
            echo "To enable: add the Google Play service account JSON to the 'transit_android' variable group in Codemagic."
            exit 0
          fi
          pip install google-auth google-api-python-client --quiet
          python3 - <<'EOF'
          import glob
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload
          from google.oauth2 import service_account

          creds = service_account.Credentials.from_service_account_file(
              '/tmp/gplay_key.json',
              scopes=['https://www.googleapis.com/auth/androidpublisher']
          )
          service = build('androidpublisher', 'v3', credentials=creds)
          package = 'in.transitco.customer'
          edit = service.edits().insert(body={}, packageName=package).execute()
          edit_id = edit['id']
          aab = glob.glob('apps/customer-app/android/app/build/outputs/**/*.aab', recursive=True)[0]
          print(f'Uploading {aab}')
          media = MediaFileUpload(aab, mimetype='application/octet-stream', resumable=True)
          service.edits().bundles().upload(
              packageName=package, editId=edit_id,
              media_body=media
          ).execute()
          service.edits().tracks().update(
              packageName=package, editId=edit_id, track='internal',
              body={'releases': [{'status': 'completed', 'releaseNotes': []}]}
          ).execute()
          service.edits().commit(packageName=package, editId=edit_id).execute()
          print('✅ Published to Play Store internal track')
          EOF

    artifacts:
      - apps/customer-app/android/app/build/outputs/bundle/release/*.aab
      - apps/customer-app/android/app/build/outputs/**/mapping.txt


