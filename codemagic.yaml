workflows:

  # ─────────────────────────────────────────────────────────────────────────────
  # Transit Customer — Android APK (sideload / internal testing)
  # Trigger: tag customer-preview-v*  OR  manual
  # ─────────────────────────────────────────────────────────────────────────────
  transit-customer-android-apk:
    name: Transit Customer — Android APK
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      android_signing:
        - transit_customer_keystore
      groups:
        - transit_android
      vars:
        EXPO_PUBLIC_API_URL: "https://transit-api.transitco.in"
        EXPO_PUBLIC_RAZORPAY_KEY: "rzp_live_Sygzq2mkLj0s0k"
        EXPO_PUBLIC_GOOGLE_MAPS_KEY: "AIzaSyBeQ62HN5qz2lgUuau6paxlbXtudCBG1yA"
      node: 20.17.0
      java: 17

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'customer-preview-v*'
          include: true

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Configure release signing
        script: |
          cat > apps/customer-app/android/key.properties << EOF
          storePassword=$CM_KEYSTORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=$CM_KEYSTORE_PATH
          EOF

          python3 << 'PYEOF'
          with open('apps/customer-app/android/app/build.gradle', 'r') as f:
              content = f.read()
          loader = (
              '\ndef keystorePropertiesFile = rootProject.file("key.properties")\n'
              'def keystoreProperties = new Properties()\n'
              'keystoreProperties.load(new FileInputStream(keystorePropertiesFile))\n\n'
          )
          content = content.replace(
              '    signingConfigs {\n        debug {',
              loader + '    signingConfigs {\n'
              '        release {\n'
              "            storeFile file(keystoreProperties['storeFile'])\n"
              "            storePassword keystoreProperties['storePassword']\n"
              "            keyAlias keystoreProperties['keyAlias']\n"
              "            keyPassword keystoreProperties['keyPassword']\n"
              '        }\n        debug {'
          ).replace(
              '            // Caution! In production, you need to generate your own keystore file.\n'
              '            // see https://reactnative.dev/docs/signed-apk-android.\n'
              '            signingConfig signingConfigs.debug',
              '            signingConfig signingConfigs.release'
          )
          with open('apps/customer-app/android/app/build.gradle', 'w') as f:
              f.write(content)
          print('✅ Release signing config patched')
          PYEOF

      - name: Set version code
        script: |
          cd apps/customer-app/android
          sed -i '' "s/versionCode [0-9]*/versionCode $BUILD_NUMBER/" app/build.gradle

      - name: Patch expo-modules-core
        script: |
          sed -i '' 's/from components\.release/afterEvaluate { from components.findByName("release") }/g' \
            node_modules/expo-modules-core/android/ExpoModulesCorePlugin.gradle

      - name: Build APK
        script: |
          export NODE_PATH="$PWD/node_modules:$PWD/apps/customer-app/node_modules"
          cd apps/customer-app/android
          ./gradlew assembleRelease

    artifacts:
      - apps/customer-app/android/app/build/outputs/apk/release/*.apk


