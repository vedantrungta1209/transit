  # ─────────────────────────────────────────────────────────────────────────────
  # Transit Customer — iOS (TestFlight)
  # Trigger: tag customer-v*
  # ─────────────────────────────────────────────────────────────────────────────
  transit-customer-ios:
    name: Transit Customer — iOS (TestFlight)
    max_build_duration: 90
    instance_type: mac_mini_m2

    environment:
      groups:
        - transit_ios
        - transit_android
      vars:
        EXPO_PUBLIC_API_URL: "https://transit-api.transitco.in"
        EXPO_PUBLIC_RAZORPAY_KEY: "rzp_live_Sygzq2mkLj0s0k"
        EXPO_PUBLIC_GOOGLE_MAPS_KEY: "AIzaSyBeQ62HN5qz2lgUuau6paxlbXtudCBG1yA"
      node: 20.19.4
      xcode: latest
      cocoapods: 1.15.2

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'customer-v*'
          include: true
        - pattern: 'customer-preview-v*'
          include: false

    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps

      - name: Set up iOS code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "in.transitco.customer" \
            --type IOS_APP_STORE \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --create
          keychain add-certificates

      - name: Expo prebuild (iOS)
        script: |
          cd apps/customer-app
          npx expo prebuild --platform ios --clean --non-interactive
          # with-environment.sh explicitly sources .xcode.env.local before react-native-xcode.sh.
          # Setting BUNDLE_COMMAND=export:embed makes react-native-xcode.sh call expo export:embed,
          # which passes customTransformOptions.routerRoot to Metro so babel-preset-expo can
          # replace process.env.EXPO_ROUTER_APP_ROOT with a string literal for require.context.
          WORKSPACE_ROOT=$(cd ../.. && pwd)
          printf 'export BUNDLE_COMMAND=export:embed\nexport CLI_PATH="%s/node_modules/expo/bin/cli"\n' \
            "$WORKSPACE_ROOT" > ios/.xcode.env.local

      - name: Patch Podfile and react_native_pods.rb
        script: |
          perl -i -0pe 's/,\s*\n\s*:privacy_file_aggregation_enabled\s*=>[^\n]*//g' apps/customer-app/ios/Podfile
          python3 << 'PYEOF'
          import os

          # 1. react-native-razorpay 3.0.0 uses <RazorpayCore/RazorpayCore-Swift.h>
          #    which only exists in razorpay-pod 2.x. CDN resolves the correct 2.x
          #    version automatically — no explicit pin needed.
          with open('apps/customer-app/ios/Podfile', 'r') as f:
              content = f.read()
          print('✅ Podfile read (razorpay-pod resolved from CDN)')

          # 2. Fix React-jsinspector missing :modular_headers => true
          old = "pod 'React-jsinspector', :path => \"#{prefix}/ReactCommon/jsinspector-modern\""
          new = "pod 'React-jsinspector', :path => \"#{prefix}/ReactCommon/jsinspector-modern\", :modular_headers => true"
          candidates = [
              'apps/customer-app/node_modules/react-native/scripts/react_native_pods.rb',
              'node_modules/react-native/scripts/react_native_pods.rb',
          ]
          patched = 0
          for path in candidates:
              if not os.path.exists(path):
                  continue
              with open(path, 'r') as f:
                  c = f.read()
              if old in c:
                  with open(path, 'w') as f:
                      f.write(c.replace(old, new, 1))
                  print(f'✅ Patched: {path}')
                  patched += 1
              elif new in c:
                  patched += 1
          if patched == 0:
              raise SystemExit('❌ react_native_pods.rb not patched')

          # 3. Inject deployment-target fix into post_install so Xcode 16 doesn't
          #    error on pods that still declare iOS 10/11 as their minimum target.
          with open('apps/customer-app/ios/Podfile', 'r') as f:
              content = f.read()
          dt_fix = (
              '  installer.pods_project.targets.each do |t|\n'
              '    t.build_configurations.each do |c|\n'
              # razorpay-pod ships vendored XCFrameworks; CocoaPods stores its
              # OTHER_CFLAGS as a Ruby Array. react_native_post_install then does
              # Array + " " + flag which raises "no implicit conversion of String
              # into Array". Flatten all Array-typed flag settings to String first.
              "      ['OTHER_CFLAGS', 'OTHER_CPLUSPLUSFLAGS'].each do |k|\n"
              "        c.build_settings[k] = c.build_settings[k].join(' ') if c.build_settings[k].is_a?(Array)\n"
              "      end\n"
              "      min = c.build_settings['IPHONEOS_DEPLOYMENT_TARGET']\n"
              '      c.build_settings[\'IPHONEOS_DEPLOYMENT_TARGET\'] = \'15.1\' if min.to_f < 15.1\n'
              "      if t.name == 'react-native-razorpay'\n"
              "        c.build_settings['GCC_TREAT_WARNINGS_AS_ERRORS'] = 'NO'\n"
              "      end\n"
              "      if t.name == 'fmt'\n"
              "        c.build_settings['CLANG_CXX_LANGUAGE_STANDARD'] = 'gnu++17'\n"
              "        c.build_settings['GCC_TREAT_WARNINGS_AS_ERRORS'] = 'NO'\n"
              "        c.build_settings['GCC_WARN_INHIBIT_ALL_WARNINGS'] = 'YES'\n"
              "        c.build_settings['CLANG_ENABLE_MODULES'] = 'NO'\n"
              "        c.build_settings['GCC_PREPROCESSOR_DEFINITIONS'] = ['$(inherited)', 'FMT_USE_FLOAT128=0', 'FMT_USE_INT128=0']\n"
              "        c.build_settings['OTHER_CPLUSPLUSFLAGS'] = '$(inherited) -w -DFMT_USE_FLOAT128=0 -DFMT_USE_INT128=0'\n"
              "      end\n"
              '    end\n'
              '  end\n'
          )
          marker = 'post_install do |installer|\n'
          if marker in content and dt_fix not in content:
              content = content.replace(marker, marker + dt_fix, 1)
              with open('apps/customer-app/ios/Podfile', 'w') as f:
                  f.write(content)
              print('✅ post_install patched: array-flatten + deploy target + razorpay warning fix')
          else:
              print('ℹ️ post_install already patched or marker not found')

          # 4. Insert fmt fix BEFORE the closing 'end' of post_install (not the
          #    target block's end), so it runs after react_native_post_install.
          with open('apps/customer-app/ios/Podfile', 'r') as f:
              lines = f.readlines()
          fmt_fix_lines = (
              '\n  # fmt compatibility fix for Xcode 26 / clang 18\n'
              '  installer.pods_project.targets.each do |t|\n'
              "    next unless t.name == 'fmt'\n"
              '    t.build_configurations.each do |c|\n'
              "      c.build_settings['CLANG_CXX_LANGUAGE_STANDARD'] = 'gnu++17'\n"
              "      c.build_settings['GCC_TREAT_WARNINGS_AS_ERRORS'] = 'NO'\n"
              "      c.build_settings['GCC_WARN_INHIBIT_ALL_WARNINGS'] = 'YES'\n"
              "      c.build_settings['CLANG_ENABLE_MODULES'] = 'NO'\n"
              "      c.build_settings['GCC_PREPROCESSOR_DEFINITIONS'] = ['$(inherited)', 'FMT_USE_FLOAT128=0', 'FMT_USE_INT128=0']\n"
              "      c.build_settings['OTHER_CPLUSPLUSFLAGS'] = '$(inherited) -w -DFMT_USE_FLOAT128=0 -DFMT_USE_INT128=0'\n"
              '    end\n'
              '  end\n'
          )
          if fmt_fix_lines not in ''.join(lines):
              # Find the target block's closing 'end' (no indentation) then the
              # preceding post_install closing '  end' (2-space indented).
              target_end_idx = None
              for i in range(len(lines)-1, -1, -1):
                  if lines[i] == 'end\n':
                      target_end_idx = i
                      break
              if target_end_idx is not None:
                  for i in range(target_end_idx-1, -1, -1):
                      if lines[i] == '  end\n':
                          lines.insert(i, fmt_fix_lines)
                          break
              with open('apps/customer-app/ios/Podfile', 'w') as f:
                  f.writelines(lines)
              print('✅ Inserted fmt fix before post_install closing end')
          PYEOF

      - name: Install CocoaPods
        script: |
          ls apps/customer-app/ios/Podfile || { echo "ERROR: Podfile missing"; exit 1; }
          export NODE_PATH="$PWD/node_modules:$PWD/apps/customer-app/node_modules"
          cd apps/customer-app/ios
          pod install --verbose 2>&1

      - name: Patch fmt sources
        script: |
          chmod -R u+w apps/customer-app/ios/Pods/fmt/
          python3 << 'PYEOF'
          import glob
          guard = '#define FMT_USE_FLOAT128 0\n#define FMT_USE_INT128 0\n'
          patched = 0
          for path in (
              glob.glob('apps/customer-app/ios/Pods/fmt/include/fmt/*.h') +
              glob.glob('apps/customer-app/ios/Pods/fmt/src/*.cc')
          ):
              with open(path, 'r') as f:
                  c = f.read()
              if guard not in c:
                  with open(path, 'w') as f:
                      f.write(guard + c)
                  print(f'  patched: {path}')
                  patched += 1
          print(f'✅ Patched {patched} fmt files with FMT_USE_FLOAT128=0 FMT_USE_INT128=0')
          PYEOF
          # Diagnostic: capture the actual clang error for fmt (no signing needed)
          echo "--- fmt compile diagnostic ---"
          cd apps/customer-app/ios
          xcodebuild build \
            -workspace Transit.xcworkspace \
            -scheme Transit \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee /tmp/fmt_diag.log | grep -E "error:|format\.cc|fmt/" | head -60 || true
          echo "--- last 40 lines of build log ---"
          tail -40 /tmp/fmt_diag.log || true

      - name: Detect Xcode workspace
        script: |
          WS=$(find apps/customer-app/ios -name "*.xcworkspace" -maxdepth 2 ! -path "*.xcodeproj/*" | head -1)
          if [ -z "$WS" ]; then echo "ERROR: No .xcworkspace found"; exit 1; fi
          SCHEME=$(basename "$WS" .xcworkspace)
          echo "XCODE_WORKSPACE=$WS" >> $CM_ENV
          echo "XCODE_SCHEME=$SCHEME" >> $CM_ENV

      - name: Set build number
        script: |
          cd apps/customer-app/ios
          agvtool new-version -all $BUILD_NUMBER

      - name: Build IPA
        script: |
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --config Release

      - name: Upload to TestFlight
        script: |
          printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" > /tmp/asc_key.p8
          chmod 600 /tmp/asc_key.p8
          app-store-connect publish \
            --path "$(find build/ios/ipa -name '*.ipa' | head -1)" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --private-key @file:/tmp/asc_key.p8 \
            --testflight

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log


  # ─────────────────────────────────────────────────────────────────────────────
  # Transit Driver — iOS (TestFlight)
  # Trigger: tag driver-v*
  # ─────────────────────────────────────────────────────────────────────────────
  transit-driver-ios:
    name: Transit Driver — iOS (TestFlight)
    max_build_duration: 90
    instance_type: mac_mini_m2

    environment:
      groups:
        - transit_ios
        - transit_android
      vars:
        EXPO_PUBLIC_API_URL: "https://transit-api.transitco.in"
        EXPO_PUBLIC_RAZORPAY_KEY: "rzp_live_Sygzq2mkLj0s0k"
        EXPO_PUBLIC_GOOGLE_MAPS_KEY: "AIzaSyBeQ62HN5qz2lgUuau6paxlbXtudCBG1yA"
      node: 20.19.4
      xcode: latest
      cocoapods: 1.15.2

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'driver-v*'
          include: true
        - pattern: 'driver-preview-v*'
          include: false

    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps

      - name: Set up iOS code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "in.transitco.driver" \
            --type IOS_APP_STORE \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --create
          keychain add-certificates

      - name: Expo prebuild (iOS)
        script: |
          cd apps/driver-app
          npx expo prebuild --platform ios --clean --non-interactive
          WORKSPACE_ROOT=$(cd ../.. && pwd)
          printf 'export BUNDLE_COMMAND=export:embed\nexport CLI_PATH="%s/node_modules/expo/bin/cli"\n' \
            "$WORKSPACE_ROOT" > ios/.xcode.env.local

      - name: Patch Podfile and react_native_pods.rb
        script: |
          perl -i -0pe 's/,\s*\n\s*:privacy_file_aggregation_enabled\s*=>[^\n]*//g' apps/driver-app/ios/Podfile
          python3 << 'PYEOF'
          import os

          # 1. react-native-razorpay 3.0.0 needs razorpay-pod 2.x (has RazorpayCore).
          #    Let CDN resolve the correct version automatically.
          with open('apps/driver-app/ios/Podfile', 'r') as f:
              content = f.read()
          print('✅ Podfile read (razorpay-pod resolved from CDN)')

          # 2. Fix React-jsinspector missing :modular_headers => true
          old = "pod 'React-jsinspector', :path => \"#{prefix}/ReactCommon/jsinspector-modern\""
          new = "pod 'React-jsinspector', :path => \"#{prefix}/ReactCommon/jsinspector-modern\", :modular_headers => true"
          candidates = [
              'apps/driver-app/node_modules/react-native/scripts/react_native_pods.rb',
              'node_modules/react-native/scripts/react_native_pods.rb',
          ]
          patched = 0
          for path in candidates:
              if not os.path.exists(path):
                  continue
              with open(path, 'r') as f:
                  c = f.read()
              if old in c:
                  with open(path, 'w') as f:
                      f.write(c.replace(old, new, 1))
                  print(f'✅ Patched: {path}')
                  patched += 1
              elif new in c:
                  patched += 1
          if patched == 0:
              raise SystemExit('❌ react_native_pods.rb not patched')

          # 3. Inject deployment-target fix into post_install so Xcode 16 doesn't
          #    error on pods that still declare iOS 10/11 as their minimum target.
          with open('apps/driver-app/ios/Podfile', 'r') as f:
              content = f.read()
          dt_fix = (
              '  installer.pods_project.targets.each do |t|\n'
              '    t.build_configurations.each do |c|\n'
              "      ['OTHER_CFLAGS', 'OTHER_CPLUSPLUSFLAGS'].each do |k|\n"
              "        c.build_settings[k] = c.build_settings[k].join(' ') if c.build_settings[k].is_a?(Array)\n"
              "      end\n"
