  # ─────────────────────────────────────────────────────────────────────────────
  # Transit Customer — iOS (TestFlight)
  # Trigger: tag customer-v*
  # ─────────────────────────────────────────────────────────────────────────────
  transit-customer-ios:
    name: Transit Customer — iOS (TestFlight)
    max_build_duration: 90
    instance_type: mac_mini_m2

    environment:
      groups:
        - transit_ios
        - transit_android
      vars:
        EXPO_PUBLIC_API_URL: "https://transit-api.transitco.in"
        EXPO_PUBLIC_RAZORPAY_KEY: "rzp_live_Sygzq2mkLj0s0k"
        EXPO_PUBLIC_GOOGLE_MAPS_KEY: "AIzaSyBeQ62HN5qz2lgUuau6paxlbXtudCBG1yA"
        BUNDLE_ID: "in.transitco.customer"
      node: 20.17.0
      xcode: latest
      cocoapods: 1.15.2

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'customer-v*'
          include: true
        - pattern: 'customer-preview-v*'
          include: false

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Expo prebuild (iOS)
        script: |
          cd apps/customer-app
          npx expo prebuild --platform ios --clean --non-interactive

      - name: Fetch signing certificate and profile
        script: |
          printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" > /tmp/asc_key.p8
          echo "$CM_CERTIFICATE" | base64 --decode > /tmp/cert.p12
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --private-key @file:/tmp/asc_key.p8 \
            --create
          keychain initialize
          keychain add-certificates --certificate /tmp/cert.p12 --certificate-password "$CM_CERTIFICATE_PASSWORD"

      - name: Detect Xcode workspace
        script: |
          WS=$(find apps/customer-app/ios -name "*.xcworkspace" -maxdepth 2 | head -1)
          SCHEME=$(basename "$WS" .xcworkspace)
          echo "XCODE_WORKSPACE=$WS" >> $CM_ENV
          echo "XCODE_SCHEME=$SCHEME" >> $CM_ENV

      - name: Install CocoaPods
        script: |
          ls apps/customer-app/ios || { echo "ERROR: ios folder missing — prebuild may have failed"; exit 1; }
          export NODE_PATH="$PWD/node_modules:$PWD/apps/customer-app/node_modules"
          cd apps/customer-app/ios
          pod install

      - name: Set build number
        script: |
          cd apps/customer-app/ios
          agvtool new-version -all $BUILD_NUMBER

      - name: Build IPA
        script: |
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

      - name: Upload to TestFlight
        script: |
          app-store-connect publish \
            --path "$(find build/ios/ipa -name '*.ipa' | head -1)" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --private-key @file:/tmp/asc_key.p8 \
            --testflight

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log


